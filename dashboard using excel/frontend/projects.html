<!DOCTYPE html>
<html>
<head>
<title>Projects</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="shared/nav.js"></script>
<script src="shared/api.js"></script>
</head>
<body>
<header><nav id="mainNav"></nav></header>
<div class="main-content"><canvas id="chart"></canvas></div>
<script>
buildNav('projects');
async function load(){
const res = await fetchData("projects");
const data = res.data;
const map = {};
data.forEach(d=>{ map[d.Stage]=(map[d.Stage]||0)+1; });
new Chart(chart,{type:'doughnut',data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}});
}
load();
</script>
</body>
</html>
