<!DOCTYPE html>
<html>
<head>
<title>Services</title>
<link rel="stylesheet" href="shared/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="shared/nav.js"></script>
<script src="shared/api.js"></script>
</head>
<body>
<header><nav id="mainNav"></nav></header>
<div class="main-content"><canvas id="chart"></canvas></div>
<script>
buildNav('services');
async function load(){
const res = await fetchData("services");
const data = res.data;
const amc = data.filter(d=>d.Type==="AMC").length;
const br = data.filter(d=>d.Type==="Breakdown").length;
new Chart(chart,{type:'bar',data:{labels:["AMC","Breakdown"],datasets:[{data:[amc,br]}]}});
}
load();
</script>
</body>
</html>
